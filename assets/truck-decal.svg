<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1000" viewBox="0 0 2400 1000">
  <!--
    Truck decal graphic redesigned for clarity and responsiveness. The
    previous design crammed a large amount of text into a very wide
    canvas which resulted in elements bleeding into the borders or
    becoming invisible when scaled down. This new layout keeps the
    important content grouped and centred with ample padding. It also
    avoids transparent text on transparent backgrounds by using
    contrasting colours. When exported to PNG the aspect ratio
    conveniently scales down for mobile, tablet and desktop without
    clipping the content.
  -->

  <!-- Main panel with rounded corners and brand background colour -->
  <rect x="0" y="0" width="2400" height="1000" rx="50" fill="#111111"/>

  <!-- Left side: brand icon and copy -->
  <g transform="translate(120,150)">
    <!-- Embedded logo icon (copied from logo-icon.svg) -->
    <rect width="360" height="360" rx="60" fill="#FFD400"/>
    <path d="M90 270 L180 135 L270 270" fill="none" stroke="#111111" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="124" y="250" width="112" height="68" rx="10" fill="none" stroke="#ffffff" stroke-width="20"/>
    <path d="M150 276 L184 240 L204 258 L172 276 L204 294 L184 312 L150 276 Z" fill="#ffffff"/>
    <path d="M236 242 L204 276 L236 276 L214 314 L282 258 L254 258 L274 224 Z" fill="#111111"/>

    <!-- Brand name and tagline lines to the right of the icon -->
    <g transform="translate(440,40)">
      <text x="0" y="0" font-size="200" font-family="Arial Black, Arial, sans-serif" letter-spacing="4" fill="#ffffff">FUSE &amp; FIX</text>
      <text x="4" y="100" font-size="80" font-family="Arial, Helvetica, sans-serif" letter-spacing="8" fill="#FFD400">HOME SERVICES</text>
      <!-- Tagline lines. Font sizes are relatively large to maintain readability when scaled down. -->
      <text x="4" y="200" font-size="60" font-family="Arial, Helvetica, sans-serif" fill="#ffffff">Electrical Repair • Lighting</text>
      <text x="4" y="270" font-size="60" font-family="Arial, Helvetica, sans-serif" fill="#ffffff">Outlets, Switches &amp; Small Fixes</text>
    </g>
  </g>

  <!-- Removed the right-hand callouts to prevent text overlap when the
       graphic is scaled down. The service area and value props are
       communicated via separate elements in the HTML. This keeps the
       decal clean and ensures that the logo and tagline remain legible
       across breakpoints. -->

  <!-- Bottom call-to-action bar -->
  <rect x="0" y="860" width="2400" height="140" fill="#FFD400"/>
  <text x="1200" y="955" text-anchor="middle" font-size="130" font-family="Arial Black, Arial, sans-serif" fill="#111111">CALL / TEXT 870-560-8903</text>
</svg>