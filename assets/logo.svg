<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    Simplified logo for header use. This replaces the prior complex
    full-logo SVG, which contained long text and tagline lines that
    became illegible when scaled down in the navigation bar. The
    background uses the brand yellow colour, and the symbol is
    identical to the one in logo-icon.svg. Text is omitted because the
    adjacent span in the HTML provides the business name.
  -->
