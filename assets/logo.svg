  <path d="M128 352 L256 160 L384 352" fill="none" stroke="#111111" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="176" y="320" width="160" height="100" rx="12" fill="none" stroke="#ffffff" stroke-width="24"/>
  <path d="M208 350 L248 310 L272 330 L240 350 L272 370 L248 390 L208 350 Z" fill="#ffffff"/>
  <path d="M304 320 L264 350 L304 350 L276 394 L352 330 L320 330 L342 290 Z" fill="#111111"/>
</svg>